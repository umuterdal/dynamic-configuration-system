services:
  mongodb:
    image: mongo:7.0
    container_name: configuration-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - config-network

  configuration-admin:
    build:
      context: .
      dockerfile: src/Configuration.Admin/Dockerfile
    container_name: configuration-admin
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConfigurationReader__ConnectionString=mongodb://admin:password123@mongodb:27017
      - ConfigurationReader__ApplicationName=Configuration.Admin
      - ConfigurationReader__DatabaseName=ConfigurationDb
      - ConfigurationReader__CollectionName=Configurations
      - ConfigurationReader__RefreshTimerIntervalInMs=30000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - config-network

  configuration-demoapi:
    build:
      context: .
      dockerfile: src/Configuration.DemoApi/Dockerfile
    container_name: configuration-demoapi
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConfigurationReader__ConnectionString=mongodb://admin:password123@mongodb:27017
      - ConfigurationReader__ApplicationName=SERVICE-A
      - ConfigurationReader__DatabaseName=ConfigurationDb
      - ConfigurationReader__CollectionName=Configurations
      - ConfigurationReader__RefreshTimerIntervalInMs=30000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - config-network

volumes:
  mongodb_data:

networks:
  config-network:
    driver: bridge
